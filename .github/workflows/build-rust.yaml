name: eucalypt build

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:
    inputs:
      narrative:
        description: 'Reason for build'
        required: false

concurrency:
  group: ${{ github.ref == 'refs/heads/master' && format('{0}-{1}', github.workflow, github.sha) || format('{0}-{1}', github.workflow, github.ref) }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Check
        run: cargo check
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run cargo audit
        run: cargo audit

  test:
    name: Test Suite
    strategy:
      matrix:
        os: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' && fromJSON('["ubuntu-latest", "macos-latest"]') || fromJSON('["ubuntu-latest"]') }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        run: cargo test
      - name: Test doc examples
        if: runner.os == 'Linux'
        run: |
          cargo build --release
          python3 scripts/test-doc-examples.py --eu ./target/release/eu --timeout 30


  wasm:
    name: WASM Compilation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy
      - name: Build library for WASM
        run: cargo build --target wasm32-unknown-unknown --lib
      - name: Clippy for WASM
        run: cargo clippy --target wasm32-unknown-unknown --lib -- -D warnings

  release-candidate-linux:
    needs: [lint, test, audit, wasm]
    name: Release Linux x86_64
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - uses: dtolnay/rust-toolchain@stable
      - name: build and install temporary eu
        run: cargo install --path .
      - name: prepare build files for new version
        run: |
          export OSTYPE=$(uname)
          export HOSTTYPE=$(uname -m)

          eu build.eu -t build-meta > build-meta.yaml.new
          mv -f build-meta.yaml.new build-meta.yaml

          echo "TAG_NAME=$(eu build.eu -t version)" >> $GITHUB_ENV
      - name: Run release tests
        run: cargo test --release
      - name: Build release
        run: cargo build --all --release
      - run: |
          strip target/release/eu
          mv target/release/eu target/release/eu_amd64
      - name: run final test with release binary
        run: |
          target/release/eu_amd64 version
          target/release/eu_amd64 test --allow-io tests/harness
      - name: Generate release notes
        run: |
          # Fetch tags created by GitHub releases
          git fetch --tags origin
          # Find the last *published* (non-draft) release tag
          PREV_TAG=$(gh release list --limit 100 --json tagName,isDraft --jq '[.[] | select(.isDraft == false)][0].tagName' 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ] || ! git rev-parse "$PREV_TAG" >/dev/null 2>&1; then
            echo "No resolvable previous release tag, using recent log"
            RANGE="HEAD"
            LOG_ARGS="-20"
          else
            echo "Generating changelog since $PREV_TAG"
            RANGE="${PREV_TAG}..HEAD"
            LOG_ARGS=""
          fi
          echo "# Release Notes" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          git log $LOG_ARGS --no-merges --pretty=format:'%s' "$RANGE" \
            | grep -v '^docs: ' \
            | grep -v '^chore: update.*submodule' \
            | sed 's/^/- /' >> CHANGELOG.md
          echo ""
          echo "Generated CHANGELOG.md:"
          cat CHANGELOG.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload changelog
        uses: actions/upload-artifact@v4
        with:
          name: CHANGELOG.md
          path: CHANGELOG.md
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: eu_amd64
          path: target/release/eu_amd64


  release-candidate-macos:
    needs: [lint, test, audit, wasm]
    name: Release MacOS
    runs-on: macos-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - uses: dtolnay/rust-toolchain@stable
      - name: Build and install temporary eu
        run: cargo install --path .
      - name: Prepare build files for new version
        run: |
          export OSTYPE=$(uname)
          export HOSTTYPE=$(uname -m)

          eu build.eu -t build-meta > build-meta.yaml.new
          mv -f build-meta.yaml.new build-meta.yaml

          echo "TAG_NAME=$(eu build.eu -t version)" >> $GITHUB_ENV
      - name: Run release tests
        run: cargo test --release
      - name: Build release
        run: cargo build --all --release
      - run: |
          strip target/release/eu
          mv target/release/eu target/release/eu_darwin
      - name: Run final test with release binary
        run: |
          target/release/eu_darwin version
          target/release/eu_darwin test --allow-io tests/harness
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: eu_darwin
          path: target/release/eu_darwin

  release-candidate-linux-arm:
    needs: [lint, test, audit, wasm]
    name: Release Linux aarch64
    runs-on: ubuntu-24.04-arm
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-arm-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-arm-cargo-
      - uses: dtolnay/rust-toolchain@stable
      - name: Build and install temporary eu
        run: cargo install --path .
      - name: Prepare build files for new version
        run: |
          export OSTYPE=$(uname)
          export HOSTTYPE=$(uname -m)

          eu build.eu -t build-meta > build-meta.yaml.new
          mv -f build-meta.yaml.new build-meta.yaml

          echo "TAG_NAME=$(eu build.eu -t version)" >> $GITHUB_ENV
      - name: Run release tests
        # eu-84nz: per-heap mark state fix (PR #437) resolved the aarch64
        # SIGSEGV caused by the shared global AtomicBool MARK_STATE.
        # Parallel tests are now safe; --test-threads=1 workaround removed.
        env:
          RUST_BACKTRACE: full
        run: cargo test --release
      - name: Run IO tests under GC stress
        # eu-rdfu diagnostic: force SelectiveEvacuation on every GC cycle to
        # surface evacuation pointer-update bugs cross-platform.
        env:
          RUST_BACKTRACE: full
          EU_GC_STRESS: "1"
        run: cargo test --release 'test_harness_10[4-9]'
      - name: Build release
        run: cargo build --all --release
      - run: |
          strip target/release/eu
          mv target/release/eu target/release/eu_aarch64
      - name: Run final test with release binary
        run: |
          target/release/eu_aarch64 version
          target/release/eu_aarch64 test --allow-io tests/harness
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: eu_aarch64
          path: target/release/eu_aarch64

  prepare-release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    needs:
      - release-candidate-linux
      - release-candidate-linux-arm
      - release-candidate-macos
    steps:

      - uses: actions/download-artifact@v4
        with:
          name: eu_darwin

      - uses: actions/download-artifact@v4
        with:
          name: eu_amd64

      - uses: actions/download-artifact@v4
        with:
          name: eu_aarch64

      - uses: actions/download-artifact@v4
        with:
          name: CHANGELOG.md

      - name: Prepare release packages
        run: |
          mkdir eucalypt-x86_64-linux
          cp eu_amd64 eucalypt-x86_64-linux/eu
          tar -cvzf eucalypt-x86_64-linux.tgz eucalypt-x86_64-linux

          mkdir eucalypt-aarch64-linux
          cp eu_aarch64 eucalypt-aarch64-linux/eu
          tar -cvzf eucalypt-aarch64-linux.tgz eucalypt-aarch64-linux

          mkdir eucalypt-aarch64-osx
          cp eu_darwin eucalypt-aarch64-osx/eu
          tar -cvzf eucalypt-aarch64-osx.tgz eucalypt-aarch64-osx

      - name: Generate SHA256SUMS
        run: |
          sha256sum *.tgz > SHA256SUMS

      - name: Query binary for version number
        run: |
          chmod +x eu_amd64
          echo "RELEASE_VERSION=$(./eu_amd64 -e eu.build.version -x text)" >> $GITHUB_ENV

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          draft: true
          prerelease: false
          body_path: CHANGELOG.md
          files: |
            eucalypt-x86_64-linux.tgz
            eucalypt-aarch64-linux.tgz
            eucalypt-aarch64-osx.tgz
            SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
