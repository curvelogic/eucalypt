name: macOS SIGSEGV diagnostic

on:
  push:
    branches:
      - 'fix/furnace-macos-segv-v2'
      - 'fix/furnace-macos-stack-fix'
  workflow_dispatch:

jobs:
  # Experiment A: exact Release MacOS clone (with cargo install) — baseline repro.
  experiment-a-with-install:
    name: "A: with cargo install, no env (attempt ${{ matrix.attempt }})"
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        attempt: [1, 2, 3, 4, 5]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-
      - uses: dtolnay/rust-toolchain@stable
      - name: Build and install temporary eu
        run: cargo install --path .
      - name: Prepare build files for new version
        run: |
          export OSTYPE=$(uname)
          export HOSTTYPE=$(uname -m)
          eu build.eu -t build-meta > build-meta.yaml.new
          mv -f build-meta.yaml.new build-meta.yaml
          echo "TAG_NAME=$(eu build.eu -t version)" >> $GITHUB_ENV
      - name: Build release
        run: cargo build --all --release
      - run: |
          strip target/release/eu
          mv target/release/eu target/release/eu_darwin
      - name: Run final test (no env)
        run: |
          target/release/eu_darwin version
          target/release/eu_darwin test --allow-io tests/harness

  # Experiment D: cargo install into separate target dir — does isolated install fix it?
  # Hypothesis: cargo install contaminates target/release/ causing mixed ABI binary.
  experiment-d-isolated-install:
    name: "D: isolated cargo install, no env (attempt ${{ matrix.attempt }})"
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        attempt: [1, 2, 3, 4, 5]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-
      - uses: dtolnay/rust-toolchain@stable
      - name: Build and install temporary eu (isolated target dir)
        run: cargo install --path . --target-dir /tmp/eu-install-tmp
      - name: Prepare build files for new version
        run: |
          export OSTYPE=$(uname)
          export HOSTTYPE=$(uname -m)
          eu build.eu -t build-meta > build-meta.yaml.new
          mv -f build-meta.yaml.new build-meta.yaml
          echo "TAG_NAME=$(eu build.eu -t version)" >> $GITHUB_ENV
      - name: Build release (clean target dir)
        run: cargo build --all --release
      - run: |
          strip target/release/eu
          mv target/release/eu target/release/eu_darwin
      - name: Run final test (no env)
        run: |
          target/release/eu_darwin version
          target/release/eu_darwin test --allow-io tests/harness
