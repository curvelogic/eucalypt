name: macOS SIGSEGV diagnostic

on:
  push:
    branches: ['**']
  workflow_dispatch:

jobs:
  # Sequential eu binary test with eprintln diagnostics.
  # [diag] stderr lines show exactly which tester phase crashes.
  macos-eu-sequential-diag:
    name: macOS eu sequential — tester phase diagnostics
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: macos-diag-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            macos-diag-registry-
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release binary (with tester-phase diagnostics)
        run: cargo build --release
      - name: Run sequential eu test (attempt 1)
        env:
          RUST_BACKTRACE: full
        run: target/release/eu test --allow-io tests/harness 2>&1
        continue-on-error: true
      - name: Run sequential eu test (attempt 2)
        env:
          RUST_BACKTRACE: full
        run: target/release/eu test --allow-io tests/harness 2>&1
        continue-on-error: true

  # EU_GC_STRESS=1 sequential test
  macos-eu-gc-stress:
    name: macOS eu sequential — EU_GC_STRESS=1
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: macos-diag-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            macos-diag-registry-
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release binary
        run: cargo build --release
      - name: Run with EU_GC_STRESS=1 (attempt 1)
        env:
          RUST_BACKTRACE: full
          EU_GC_STRESS: "1"
        run: target/release/eu test --allow-io tests/harness 2>&1
        continue-on-error: true
      - name: Run with EU_GC_STRESS=1 (attempt 2)
        env:
          RUST_BACKTRACE: full
          EU_GC_STRESS: "1"
        run: target/release/eu test --allow-io tests/harness 2>&1
        continue-on-error: true

  # Isolate IO tests individually
  macos-eu-isolate-io-tests:
    name: macOS eu — isolate IO tests individually
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: macos-diag-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            macos-diag-registry-
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release binary
        run: cargo build --release
      - name: Test 116 io_shell_with
        env:
          RUST_BACKTRACE: full
        run: target/release/eu test --allow-io tests/harness/116_io_shell_with.eu
        continue-on-error: true
      - name: Test 117 io_exec
        env:
          RUST_BACKTRACE: full
        run: target/release/eu test --allow-io tests/harness/117_io_exec.eu
        continue-on-error: true
      - name: Test 118 io_exec_with
        env:
          RUST_BACKTRACE: full
        run: target/release/eu test --allow-io tests/harness/118_io_exec_with.eu
        continue-on-error: true
      - name: Test 119 monad_utility
        env:
          RUST_BACKTRACE: full
        run: target/release/eu test --allow-io tests/harness/119_monad_utility.eu
        continue-on-error: true
      - name: Test 120 random_monad
        env:
          RUST_BACKTRACE: full
        run: target/release/eu test --allow-io tests/harness/120_random_monad.eu
        continue-on-error: true

  # Narrowing: does the crash need all 115 prior tests, or fewer?
  macos-eu-partial-sequential:
    name: macOS eu — partial sequential narrowing
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: macos-diag-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            macos-diag-registry-
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release binary
        run: cargo build --release
      - name: Run tests 110-120 in one process
        env:
          RUST_BACKTRACE: full
        run: |
          set +e
          target/release/eu test --allow-io \
            tests/harness/110_parse_as_csv.eu \
            tests/harness/111_parse_as_xml.eu \
            tests/harness/112_parse_as_edn.eu \
            tests/harness/113_parse_as_jsonl.eu \
            tests/harness/114_parse_as_roundtrip.eu \
            tests/harness/115_parse_as_data_only.eu \
            tests/harness/116_io_shell_with.eu \
            tests/harness/117_io_exec.eu \
            tests/harness/118_io_exec_with.eu \
            tests/harness/119_monad_utility.eu \
            tests/harness/120_random_monad.eu 2>&1
          echo "exit: $?"
        continue-on-error: true
      - name: Run tests 100-120 in one process
        env:
          RUST_BACKTRACE: full
        run: |
          set +e
          target/release/eu test --allow-io \
            $(ls tests/harness/1[0-1][0-9]_*.eu | sort) \
            tests/harness/120_random_monad.eu 2>&1
          echo "exit: $?"
        continue-on-error: true
